x-worker: &worker
  build:
    context: .
    dockerfile: Dockerfile
    target: worker
  environment:
    crackhash.manager.url: http://crackhash-manager:8080
    SERVER_PORT: "8080"
  depends_on:
    - crackhash-manager

services:
  crackhash-manager:
    build:
      context: .
      dockerfile: Dockerfile
      target: manager
    container_name: crackhash-manager
    ports:
      - "8080:8080"
    environment:
      crackhash.worker.urls: http://crackhash-worker:8080,http://crackhash-worker-2:8080,http://crackhash-worker-3:8080
      crackhash.request.timeout-seconds: "300"

  crackhash-worker:
    <<: *worker
    container_name: crackhash-worker

  crackhash-worker-2:
    <<: *worker
    container_name: crackhash-worker-2

  crackhash-worker-3:
    <<: *worker
    container_name: crackhash-worker-3
